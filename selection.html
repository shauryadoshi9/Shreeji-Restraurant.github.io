<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dietary Preference | Shreeji Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="container">
            <a href="index.html" class="logo">Shreeji</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cart.html">My Cart</a></li>
            </ul>
            <a href="cart.html" class="cart-btn-link">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-counter" id="cartCounter">0</span>
            </a>
        </div>
    </nav>

    <main class="container">
        <section style="text-align: center;">
            <h2 class="section-title">What's Your Craving Today?</h2>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Please select your dietary preference to see the menu.</p>
            
            <div class="selection-grid">
                <div class="selection-card" onclick="selectPref('veg')">
                    <i class="fas fa-leaf"></i>
                    <h3>Pure Veg</h3>
                    <p style="margin-top: 10px; color: var(--text-muted)">The finest vegetarian delicacies.</p>
                </div>
                <div class="selection-card" onclick="selectPref('non-veg')">
                    <i class="fas fa-drumstick-bite"></i>
                    <h3>Non-Veg</h3>
                    <p style="margin-top: 10px; color: var(--text-muted)">Succulent meat and poultry dishes.</p>
                </div>
                <div class="selection-card" onclick="selectPref('all')">
                    <i class="fas fa-utensils"></i>
                    <h3>Both</h3>
                    <p style="margin-top: 10px; color: var(--text-muted)">Explore our complete culinary range.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="common.js"></script>
    <script>
        function selectPref(type) {
            PreferenceManager.setPreference(type);
            window.location.href = 'menu.html';
        }
    </script>
</body>
</html>
