<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | Shreeji Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-page-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }
        .cart-list {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--glass-border);
        }
        .cart-page-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 0;
            border-bottom: 1px solid var(--glass-border);
        }
        .cart-page-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }
        .summary-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--primary-color);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        @media (max-width: 992px) {
            .cart-page-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container">
            <a href="index.html" class="logo">Shreeji</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Back to Menu</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title" style="text-align: left; margin-top: 40px;">Review Your Selection</h2>
        
        <div id="emptyCart" style="display: none; text-align: center; padding: 100px 0;">
            <i class="fas fa-shopping-basket" style="font-size: 80px; color: var(--text-muted); margin-bottom: 20px;"></i>
            <h3>Your selection is empty</h3>
            <p style="margin-bottom: 30px; color: var(--text-muted)">Ready to add some flavors?</p>
            <a href="selection.html" class="btn btn-primary">Start Browsing</a>
        </div>

        <div class="cart-page-container" id="cartLayout">
            <div class="cart-list" id="cartListItems">
                <!-- Items injected here -->
            </div>
            
            <div class="summary-card">
                <h3 style="margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;">Order Summary</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span>GST (5%)</span>
                    <span id="gst">₹0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--primary-color); font-weight: 700; font-size: 20px;">
                    <span>Grand Total</span>
                    <span id="grandTotal" style="color: var(--primary-color);">₹0</span>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 30px;" id="checkoutBtn">Checkout & Print Bill</button>
                <button class="btn btn-outline" style="width: 100%; margin-top: 10px;" onclick="clearAll()">Clear All</button>
            </div>
        </div>
    </main>

    <!-- Bill Modal -->
    <div class="modal-overlay" id="billModal">
        <div class="bill-modal" style="font-family: 'Courier New', monospace; background: #fff; color: #000; padding: 40px; border-radius: 5px;">
            <div class="bill-content" id="billContent" style="white-space: pre-wrap;"></div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 20px; border-radius: 5px;" onclick="window.print()">Print Order</button>
            <button class="btn btn-outline" style="width: 100%; margin-top: 10px; border-radius: 5px; border-color: #000; color: #000;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', updateCartPage);

        function updateCartPage() {
            const cart = CartManager.getCart();
            const emptyDiv = document.getElementById('emptyCart');
            const layoutDiv = document.getElementById('cartLayout');
            
            if (cart.length === 0) {
                emptyDiv.style.display = 'block';
                layoutDiv.style.display = 'none';
                return;
            }

            const listItems = document.getElementById('cartListItems');
            listItems.innerHTML = '';
            let sub = 0;

            cart.forEach((item, index) => {
                sub += item.price;
                const div = document.createElement('div');
                div.className = 'cart-page-item';
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div style="flex-grow: 1;">
                        <h4 style="font-size: 18px;">${item.name}</h4>
                        <p style="color: var(--text-muted); font-size: 14px;">${item.category}</p>
                    </div>
                    <div style="font-weight: 700; color: var(--primary-color);">₹${item.price}</div>
                    <button onclick="remove(${index})" style="background: transparent; color: var(--accent-color); font-size: 18px;"><i class="fas fa-trash"></i></button>
                `;
                listItems.appendChild(div);
            });

            const gstVal = Math.round(sub * 0.05);
            document.getElementById('subtotal').innerText = `₹${sub}`;
            document.getElementById('gst').innerText = `₹${gstVal}`;
            document.getElementById('grandTotal').innerText = `₹${sub + gstVal}`;
        }

        function remove(idx) {
            CartManager.removeFromCart(idx);
            updateCartPage();
        }

        function clearAll() {
            CartManager.clearCart();
            updateCartPage();
        }

        document.getElementById('checkoutBtn').onclick = () => {
            const cart = CartManager.getCart();
            let sub = cart.reduce((s, i) => s + i.price, 0);
            let gstVal = Math.round(sub * 0.05);
            
            let bill = `******** SHREEJI RESTAURANT ********\n`;
            bill += `Contact: +91 98765 43210\n`;
            bill += `Address: Sector 45, New Delhi\n`;
            bill += `------------------------------------\n`;
            cart.forEach(item => {
                bill += `${item.name.padEnd(25)} ₹${item.price}\n`;
            });
            bill += `------------------------------------\n`;
            bill += `Subtotal:                ₹${sub}\n`;
            bill += `GST (5%):                ₹${gstVal}\n`;
            bill += `GRAND TOTAL:             ₹${sub + gstVal}\n`;
            bill += `------------------------------------\n`;
            bill += `        TASTE THE DIVINE            \n`;
            
            document.getElementById('billContent').innerText = bill;
            document.getElementById('billModal').classList.add('open');
        };

        function closeModal() {
            document.getElementById('billModal').classList.remove('open');
        }
    </script>
</body>
</html>
